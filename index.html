<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirection...</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0d0d0d;
      color: #ffffff;
      font-family: sans-serif;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <p>Redirection dans <span id="countdown">2</span>s...</p>
  <script>
    let t = 2;
    const el = document.getElementById('countdown');
    const interval = setInterval(() => {
      t--;
      el.textContent = t;
      if (t <= 0) {
        clearInterval(interval);
        window.location.replace('https://xune.app');
      }
    }, 1000);
  </script>
</body>
</html>
